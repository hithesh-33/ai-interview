<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeForge — AI Scorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Dark Theme Variables */
        :root {
            --bg: #0b1120;
            --sidebar: #161e2d;
            --accent: #38bdf8;
            --card: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #f43f5e;
            --border: #2d3748;
            --gold: #d4a853;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family:'DM Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 2rem; 
            line-height: 1.6;
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--sidebar); 
            padding: 2.5rem; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
        }
        
        h1 { font-family: 'Playfair Display'; margin-bottom: 0.5rem; color: var(--accent); font-size: 2.2rem; }
        h3 { color: var(--text-main); margin-bottom: 1rem; font-weight: 600; }
        p { color: var(--text-dim); margin-bottom: 2rem; }

        /* Upload Area */
        .upload-box { 
            border: 2px dashed var(--border); 
            padding: 3rem; 
            text-align: center; 
            border-radius: 15px; 
            background: var(--card); 
            cursor: pointer; 
            transition: 0.3s; 
            position: relative; 
        }
        .upload-box:hover { 
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }
        .upload-box input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        #upload-label strong { color: var(--accent); }
        
        /* Inputs & Buttons */
        textarea { 
            width: 100%; 
            height: 150px; 
            padding: 1rem; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            font-family: inherit; 
            background: var(--card); 
            color: var(--text-main);
            transition: 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: #263349;
        }

        .btn { 
            background: var(--accent); 
            color: var(--bg); 
            padding: 14px 24px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 1rem; 
            width: 100%; 
            font-size: 1rem; 
            transition: 0.3s;
        }
        .btn:hover { 
            opacity: 0.9; 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        /* Results Area */
        .results-panel { 
            display: none; 
            margin-top: 2.5rem; 
            border-top: 1px solid var(--border); 
            padding-top: 2rem; 
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .score-display { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        
        .score-circle { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 6px solid var(--accent); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.2rem; 
            font-weight: 900; 
            font-family: 'Playfair Display'; 
            color: var(--accent); 
            background: rgba(56, 189, 248, 0.1);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        
        .feedback-item { 
            background: var(--card); 
            padding: 1.2rem; 
            border-radius: 10px; 
            margin-bottom: 0.8rem; 
            border-left: 4px solid var(--gold); 
            font-size: 0.9rem; 
            color: var(--text-main);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .critical { 
            border-left-color: var(--danger); 
            background: rgba(244, 63, 94, 0.05); 
        }
        
        .spinner { 
            width: 40px; 
            height: 40px; 
            border: 3px solid var(--border); 
            border-top: 3px solid var(--accent); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            display: none; 
            margin: 2rem auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Resume Scorer</h1>
    <p>Upload your resume (.txt) to see how it matches AIML industry standards.</p>

    <div class="upload-box" id="drop-zone">
        <div id="upload-label">
            <strong>Click to upload</strong> or drag and drop<br>
            <small>Supports .txt files (or paste content below)</small>
        </div>
        <input type="file" id="resume-file" accept=".txt">
    </div>

    <div style="margin: 1.5rem 0;">
        <textarea id="manual-text" placeholder="Or paste your resume text here..." style="width: 100%; height: 150px; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit;"></textarea>
    </div>

    <button class="btn" onclick="processResume()">Scan & Score My Resume</button>
    <div class="spinner" id="loader"></div>

    <div class="results-panel" id="results">
        <div class="score-display">
            <div class="score-circle" id="final-score">0</div>
            <div>
                <h2 id="verdict">Analyzing...</h2>
                <p id="summary">Based on your keywords and structure.</p>
            </div>
        </div>

        <h3>Areas for Improvement:</h3>
        <div id="feedback-list"></div>
    </div>
</div>

<script>
    function processResume() {
        const fileInput = document.getElementById('resume-file');
        const manualText = document.getElementById('manual-text').value;
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');

        loader.style.display = 'block';
        results.style.display = 'none';

        // If file is uploaded, read it; otherwise use manual text
        if (fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = function(e) {
                analyzeText(e.target.result);
            };
            reader.readAsText(fileInput.files[0]);
        } else if (manualText) {
            analyzeText(manualText);
        } else {
            alert("Please upload a file or paste text!");
            loader.style.display = 'none';
        }
    }

    function analyzeText(text) {
        const lowerText = text.toLowerCase();
        let score = 30; // Base score
        let feedback = [];

        // 1. Keyword Checks (Customized for HK's AIML profile)
        const keywords = {
            'gemini': 15,
            'python': 10,
            'react': 10,
            'machine learning': 10,
            'api': 5,
            'git': 5,
            'deployment': 5,
            'dataset': 5
        };

        for (let key in keywords) {
            if (lowerText.includes(key)) {
                score += keywords[key];
            } else {
                feedback.push({
                    text: `Missing keyword: "${key.toUpperCase()}". High-paying AIML roles require this expertise.`,
                    type: key === 'gemini' || key === 'python' ? 'critical' : 'normal'
                });
            }
        }

        // 2. Length check
        if (text.length < 500) {
            score -= 10;
            feedback.push({ text: "Content is too short. Add more details about your project responsibilities.", type: 'critical' });
        }

        // 3. Action Verb check
        const verbs = ['developed', 'implemented', 'optimized', 'architected', 'leveraged'];
        let verbCount = 0;
        verbs.forEach(v => { if(lowerText.includes(v)) verbCount++; });
        if(verbCount < 2) {
            score -= 5;
            feedback.push({ text: "Use more strong action verbs (e.g., 'Optimized', 'Architected') to describe your work.", type: 'normal' });
        }

        // Final score capping
        score = Math.min(score, 100);

        // Display results after delay
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const verdict = document.getElementById('verdict');
            if(score > 85) verdict.innerText = "Excellent! Industry Ready.";
            else if(score > 60) verdict.innerText = "Good, but needs polish.";
            else verdict.innerText = "Needs significant work.";

            const list = document.getElementById('feedback-list');
            list.innerHTML = feedback.map(f => `
                <div class="feedback-item ${f.type === 'critical' ? 'critical' : ''}">
                    ${f.text}
                </div>
            `).join('');
        }, 1200);
    }
</script>

</body>
</html>
