<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewAI | Professional Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1120; --sidebar: #161e2d; --accent: #38bdf8;
            --card: #1e293b; --text-main: #f1f5f9; --text-dim: #94a3b8;
            --success: #10b981; --danger: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 40px 20px; }

        .container { max-width: 900px; margin: auto; background: var(--sidebar); padding: 30px; border-radius: 20px; border: 1px solid #2d3748; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3748; padding-bottom: 20px; margin-bottom: 30px; }
        h2 { color: var(--accent); }
        #timer { font-size: 1.2rem; font-weight: 600; padding: 8px 15px; background: rgba(56, 189, 248, 0.1); border-radius: 8px; border: 1px solid var(--accent); transition: 0.3s; }

        .question-card { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; transition: 0.3s; }
        .question-card:hover { border-color: var(--accent); }
        .question-text { font-size: 1.1rem; margin-bottom: 15px; font-weight: 500; }

        .option-label { display: block; padding: 12px 15px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { background: #1e293b; border-color: var(--accent); }
        input[type="radio"] { margin-right: 10px; accent-color: var(--accent); }

        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 30px; align-items: center; }
        button { padding: 12px 25px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; background: var(--accent); color: var(--bg); }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }
        
        #submitBtn { background: var(--success); color: white; }
        #result { text-align: center; font-size: 1.5rem; margin-top: 20px; color: var(--accent); }
        
        .feedback { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 0.9rem; display: none; }
        .correct { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .wrong { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>🧠 Aptitude & Tech Test</h2>
        <div id="timer">Time Left: 30:00</div>
    </div>

    <div id="quizForm"></div>

    <div class="controls">
        <button id="prevBtn" onclick="changePage(-1)">Previous</button>
        <span id="pageIndicator" style="color: var(--text-dim)">Page 1 of 3</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
        <button id="submitBtn" class="hidden" onclick="submitTest()">Final Submit</button>
    </div>

    <h3 id="result"></h3>
</div>

<script>
const questionBank = [
    // 🧮 APTITUDE (1-15)
    { q: "What is 15 × 3?", o: ["30", "45", "50", "60"], a: "45", e: "15*3 = 45." },
    { q: "Next number: 2, 4, 8, 16, ?", o: ["18", "24", "32", "30"], a: "32", e: "Doubling series." },
    { q: "What is 25% of 200?", o: ["25", "50", "75", "100"], a: "50", e: "0.25 * 200 = 50." },
    { q: "Find odd one: 2, 3, 5, 9, 7", o: ["2", "3", "5", "9"], a: "9", e: "9 is not prime." },
    { q: "√144 = ?", o: ["10", "11", "12", "13"], a: "12", e: "12*12 = 144." },
    { q: "Speed 60km/h, Time 2h. Distance?", o: ["100", "110", "120", "130"], a: "120", e: "60*2 = 120." },
    { q: "If CAT=24, DOG=?", o: ["24", "26", "28", "30"], a: "26", e: "D(4)+O(15)+G(7) = 26." },
    { q: "Ratio 2:3, Total 50. First part?", o: ["20", "25", "30", "35"], a: "20", e: "2/5 * 50 = 20." },
    { q: "Next: 1, 4, 9, 16, ?", o: ["20", "24", "25", "30"], a: "25", e: "Perfect squares." },
    { q: "Profit on 100 sold at 120?", o: ["10%", "15%", "20%", "25%"], a: "20%", e: "20/100 = 20%." },
    { q: "3 cats catch 3 rats in 3 min. 1 cat catches 1 rat in?", o: ["1 min", "2 min", "3 min", "4 min"], a: "3 min", e: "Independent workers." },
    { q: "100 ÷ 4 = ?", o: ["20", "25", "30", "35"], a: "25", e: "100/4 = 25." },
    { q: "What is 12 × 8?", o: ["96", "88", "108", "92"], a: "96", e: "12*8 = 96." },
    { q: "Cube of 3?", o: ["9", "18", "27", "81"], a: "27", e: "3*3*3 = 27." },
    { q: "If 5x=20, x=?", o: ["2", "3", "4", "5"], a: "4", e: "20/5 = 4." },

    // 💻 TECHNICAL (AIML/WEB) (16-30)
    { q: "Which HTML tag is used for JavaScript?", o: ["<js>", "<scripting>", "<script>", "<javascript>"], a: "<script>", e: "Standard tag." },
    { q: "What does 'ML' stand for?", o: ["Manual Learning", "Machine Learning", "Main Logic", "Meta Layer"], a: "Machine Learning", e: "Core AI field." },
    { q: "React is a library for?", o: ["Backend", "Frontend", "Database", "OS"], a: "Frontend", e: "Developed by Meta." },
    { q: "Supervised Learning requires?", o: ["No Data", "Unlabeled Data", "Labeled Data", "Random Data"], a: "Labeled Data", e: "Needs target labels." },
    { q: "Which CSS property changes text color?", o: ["font-style", "text-color", "color", "background"], a: "color", e: "Basic CSS." },
    { q: "In Python, which keyword defines a function?", o: ["func", "define", "def", "function"], a: "def", e: "Short for define." },
    { q: "Which layer handles pixel data in AI?", o: ["Dense", "Dropout", "Convolutional", "Recurrent"], a: "Convolutional", e: "CNNs for images." },
    { q: "What is 'NaN' in JavaScript?", o: ["Not a Number", "New and Next", "No available Node", "Null and None"], a: "Not a Number", e: "Numeric data type." },
    { q: "Which is a NoSQL database?", o: ["MySQL", "PostgreSQL", "MongoDB", "Oracle"], a: "MongoDB", e: "Document based." },
    { q: "Overfitting means?", o: ["Good performance", "High bias", "High variance", "Low accuracy"], a: "High variance", e: "Model learns noise." },
    { q: "Git is a?", o: ["Language", "Version Control", "IDE", "Server"], a: "Version Control", e: "Created by Linus Torvalds." },
    { q: "What is the result of 2 + '2' in JS?", o: ["4", "'22'", "'4'", "Error"], a: "'22'", e: "Type coercion." },
    { q: "API stands for?", o: ["App Program Interface", "Auto Power In", "Advanced Proto Info", "All Point Input"], a: "App Program Interface", e: "Software connector." },
    { q: "Standard activation function in Hidden layers?", o: ["Step", "Sigmoid", "ReLU", "Linear"], a: "ReLU", e: "Rectified Linear Unit." },
    { q: "Main goal of HTML?", o: ["Styling", "Logic", "Structure", "Database"], a: "Structure", e: "Standard markup." }
];

let currentPage = 0;
const qPerPage = 10;
let userAnswers = Array(30).fill(null);
let timeLeft = 30 * 60; // 30 minutes

function startTimer() {
    const timerInterval = setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        const timerEl = document.getElementById("timer");
        timerEl.innerText = `Time Left: ${mins}:${secs < 10 ? '0'+secs : secs}`;
        
        if (timeLeft <= 300) timerEl.style.color = "var(--danger)";
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            submitTest();
        }
    }, 1000);
}

function renderPage() {
    const form = document.getElementById("quizForm");
    form.innerHTML = "";
    const start = currentPage * qPerPage;
    const end = start + qPerPage;

    questionBank.slice(start, end).forEach((q, i) => {
        const qIndex = start + i;
        let html = `<div class="question-card">
            <p class="question-text"><b>Q${qIndex + 1}. ${q.q}</b></p>`;

        q.o.forEach(opt => {
            const checked = userAnswers[qIndex] === opt ? "checked" : "";
            html += `
                <label class="option-label">
                    <input type="radio" name="q${qIndex}" value="${opt}" ${checked} onchange="saveAnswer(${qIndex}, '${opt}')">
                    ${opt}
                </label>`;
        });

        html += `<div id="feedback${qIndex}" class="feedback"></div></div>`;
        form.innerHTML += html;
    });

    document.getElementById("pageIndicator").innerText = `Page ${currentPage + 1} of 3`;
    document.getElementById("prevBtn").disabled = currentPage === 0;
    document.getElementById("nextBtn").classList.toggle("hidden", currentPage === 2);
    document.getElementById("submitBtn").classList.toggle("hidden", currentPage !== 2);
}

function saveAnswer(index, val) { userAnswers[index] = val; }

function changePage(step) {
    currentPage += step;
    renderPage();
    window.scrollTo(0,0);
}

function submitTest() {
    let score = 0;
    questionBank.forEach((q, i) => {
        const feedback = document.getElementById(`feedback${i}`);
        const isCorrect = userAnswers[i] === q.a;
        if (isCorrect) score++;

        if (feedback) {
            feedback.style.display = "block";
            feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            feedback.innerHTML = isCorrect ? `✔ Correct!` : `✖ Wrong. Correct: ${q.a} <br> ${q.e}`;
        }
    });

    document.getElementById("result").innerText = `Final Score: ${score} / 30`;
    document.getElementById("submitBtn").disabled = true;
    alert(`Test Submitted! Your Score: ${score}/30`);
}

// Init
window.onload = () => {
    renderPage();
    startTimer();
};
</script>

</body>
</html>
